name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bet
          POSTGRES_PASSWORD: betpass
          POSTGRES_DB: betmundial
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bet -d betmundial"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://bet:betpass@localhost:5432/betmundial
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Typecheck (server)
        run: npm run lint -w server

      - name: Compilar (server + web)
        run: npm run build

      - name: Pruebas del backend
        run: npm test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build de la imagen del API
        run: docker build -f server/Dockerfile -t betmundial-api:ci .
      - name: Build de la imagen web
        run: docker build -f web/Dockerfile -t betmundial-web:ci .
      - name: Build de la imagen combinada (Railway / un solo servicio)
        run: docker build -f Dockerfile -t betmundial-allinone:ci .
